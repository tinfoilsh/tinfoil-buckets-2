# Tinfoil Buckets release workflow.
#
# Trigger from a branch via "Run workflow" and provide the version. Builds the
# container image, pushes it to GHCR with version + digest tags, creates the
# release tag, and publishes a GitHub release.
#
# This repo is a sidecar component — it does not ship its own enclave config.

name: Tinfoil Release

run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. v1.0.0)"
        required: true
        type: string

concurrency:
  group: tinfoil-buckets-sidecar-release-${{ inputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout + check the tag does not exist
      packages: write # push the container image
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Check if version tag already exists
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q .; then
            echo "::error::Tag $VERSION already exists"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=sha,format=short

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ inputs.version }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag + GitHub release

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Create release tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          DIGEST: ${{ needs.build.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          gh release create "$VERSION" \
            --title "$VERSION" \
            --verify-tag \
            --generate-notes \
            --notes "Image: \`$IMAGE@$DIGEST\`"
